<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keep — Gestão, Investimentos e Participações</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #b89a5a;
      --gold-light: #d4b87a;
      --dark: #0b0d0f;
      --dark-soft: #1a1e23;
      --text: #e8e2d8;
      --text-muted: #8a8278;
      --border: rgba(184,154,90,0.2);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    .glow {
      position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(184,154,90,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    main {
      flex: 1;
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      text-align: center;
      gap: 40px;
    }

    main::before {
      content: '';
      display: block;
      width: 1px; height: 80px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      animation: growLine 1.2s ease both 0.3s;
      opacity: 0;
    }

    .logo-area {
      animation: fadeUp 1s ease both 0.5s;
      opacity: 0;
    }

    .logo-img {
      width: 220px;
      height: 90px;
      object-fit: contain;
      display: block;
      margin: 0 auto 28px;
    }

    .company-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1.2;
    }

    .company-name em {
      font-style: italic;
      color: var(--gold-light);
    }

    .company-sub {
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 12px;
    }

    .divider {
      width: 50px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      animation: fadeUp 1s ease both 0.8s;
      opacity: 0;
    }

    footer {
      position: relative; z-index: 1;
      background: var(--dark-soft);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 60px 40px 44px;
      overflow: hidden;
    }

    footer::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent, transparent 28px,
        rgba(184,154,90,0.025) 28px,
        rgba(184,154,90,0.025) 30px
      );
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--gold);
      padding: 14px 36px;
      margin-bottom: 20px;
      position: relative;
      background: rgba(184,154,90,0.06);
    }

    .badge-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s ease infinite;
      flex-shrink: 0;
    }

    .badge-text {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .construction-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 14px;
      position: relative;
    }

    .footer-copy {
      font-size: 0.54rem;
      letter-spacing: 0.18em;
      color: rgba(138,130,120,0.4);
      text-transform: uppercase;
      position: relative;
      margin-top: 28px;
    }

    .email-area {
      animation: fadeUp 1s ease both 1s;
      opacity: 0;
      text-align: center;
    }

    .email-label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .email-link {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 3.2vw, 2.4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--gold-light);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.3s, letter-spacing 0.3s;
      display: inline-block;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    .email-link:hover {
      color: var(--text);
      letter-spacing: 0.07em;
      border-color: var(--gold);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes growLine {
      from { opacity: 0; transform: scaleY(0); transform-origin: top; }
      to   { opacity: 1; transform: scaleY(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<main>
  <div class="logo-area">
    <img class="logo-img" src="logo.png" alt="Keep" />
    <h1 class="company-name"><em>Keep</em></h1>
    <p class="company-sub">Gestão · Investimentos · Participações · S.A.</p>
  </div>

  <div class="divider"></div>

  <div class="email-area">
    <p class="email-label">Contacto</p>
    <a class="email-link" href="mailto:escritorio@keepgroup.com">escritorio@keepgroup.com</a>
  </div>
</main>

<footer>
  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-text">Site em construção</span>
  </div>

  <h2 class="construction-title">Estamos a preparar algo notável.</h2>

  <p class="footer-copy">© 2025 Keep — Gestão, Investimentos e Participações S.A.</p>
</footer>

</body>
</html>
